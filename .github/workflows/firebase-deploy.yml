name: Deploy to Firebase Hosting

# Every push to main builds the static site and deploys it to Firebase Hosting.
# Pull requests get a temporary preview channel so you can review before merging.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Deploy to the live site on push to main.
      # Firebase returns HTTP 400 "current active version" when the built output
      # is byte-for-byte identical to what is already live (e.g. only workflow
      # or config files changed). We catch that specific error and treat it as a
      # success — the site is already up to date. All other non-zero exit codes
      # still fail the job.
      - name: Deploy (live)
        if: github.event_name == 'push'
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLASSONE }}
        run: |
          echo "$FIREBASE_SA" > /tmp/sa.json
          trap 'rm -f /tmp/sa.json' EXIT
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npx firebase-tools@latest deploy --only hosting --project classone-systems 2>&1 | tee /tmp/deploy.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ] && grep -q "current active version" /tmp/deploy.log; then
            echo "Site is already up to date — no release needed."
            exit 0
          fi
          exit $EXIT

      # Deploy a temporary preview channel for PRs.
      - name: Deploy (PR preview)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLASSONE }}
          projectId: classone-systems
